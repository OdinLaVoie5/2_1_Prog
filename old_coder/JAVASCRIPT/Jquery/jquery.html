<script>
// ##jquery ##animate $   ready   click    css      show hide  slideUp    !!! fadeOut   toggle (исчезновение/появление) 

	
$(document).ready(function(){ // Когда документ веб-страницы будет готов,выполнить следующие действия.

	//////////////////////////////////////////////////////////////////////
	var flag = 0;
	$("#jq").click(function(){ // При щелчке на любой кнопке сделать следующее:
		if (!flag) {
			$("h1").hide("slow"); // Все элементы h1 медленно исчезают со страницы.
			$("h2").show("slow"); // Все элементы h2 медленно появляются на странице.   "fast"
			// $("img").slideUp(); // Все элементы img скользят вверх и исчезают.
			flag = 1;
		}
		else {
			$("h1").show("slow"); // Все элементы h1 медленно исчезают со страницы.
			$("h2").hide("slow"); // Все элементы h2 медленно появляются на странице.
			flag = 0;
		}
	}); // Конец функции click.
	
	
	//////////////////////////////////////////////////////////////////////
	$("#move_up").click( function() {
			$("#change_me").animate({top:30},200);
		});//end move_up
		$("#move_down").click( function() {
			$("#change_me").animate({top:500},2000);
		});//end move_down
		$("#color").click( function() {
			$("#change_me").css("color", "gold");
		});//end color
		$("#disappear").click( function() {
			$("#change_me").toggle("slow");
			$("#jq").fadeOut(3000);
	});//end disappear
	
	
	//  ###Амбер    my ##аккордион
	var flagThis;
	var flagPic = 0;
	$(".clickMe").click(function() {
		$(".pic").fadeOut(1000);
		$(".picframe").slideUp ("slow");
			if ((flagThis !== this) || (flagPic)) { 
				flagPic = 0;
				$(this.nextElementSibling.firstElementChild).fadeIn(1000);
				$(this.nextElementSibling).slideDown("slow");
			}
			else flagPic = (flagPic + 1)%2;
			
		$(".pic~p").html("");
		flagThis = this;
	});
	
	$(".pic").click(function() {
		//$(".pic~p").html(this.parentElement.previousElementSibling.innerHTML);
		$(this).animate({height:200,width:150},500).animate({height:300,width:200},500);
		// location.reload(); // ##перезагрузка
		// my window.open("file:///E|/files/2_1_Prog/coder/JAVASCRIPT/Jquery/jquery.html",true)
	});
	
	// $("button:first-of-type").trigger('click');

}); // Конец функции ready.
