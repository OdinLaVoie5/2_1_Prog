//    Вычисление кода в глобальной области действия  нужно для скрипта ниже

function globalEval(data) {
  data = data.replace(/^\s*|\s*$/g, "");
  if (data) {
	var head = document.getElementsByTagName("head")[0] || document.documentElement;
	script = document.createElement("script");
	script.type = "text/javascript";
	script.text = data;
	head.appendChild(script);
	head.removeChild(script);
  }
}

// Создание дескриптора типа сценария для выполнения только после загрузки страницы
// +++ АОП в javaScript.         Аспектно-ориентированное программирование (АОП) определяется в Википедии как "парадигма программирования, основанная на идее разделения сквозной функциональности для улучшения разбиения программы на модули"     + см функции, ninja, запоминани

window.onload = function(){
  var scripts = document.getElementsByTagName("script"); 
  for (var i = 0; i < scripts.length; i++) { 
	if (scripts[i].type = "x/onload") { 
	  globalEval(scripts[i].innerHTML);
	}
  }
};
</script>

<script type="x/onload">    //  дескрипторы сценариев с недействительными атрибутами типов применяются в качестве средства для включения на странице новых фрагментов данных , которых не должен касаться браузер
assert(true,"XXX исполняется после загрузки страницы");    //3//////////////////////////
</script>

<!--Обратите внимание: несмотря на то что этот программный код записан в нескольких строках, синтаксический анализатор разметки HTML обработает его как одну строку, а потому однострочные комментарии (//) здесь работать не будут. Кроме того, не забывайте, что весь этот программный код является частью значения HTML-атрибута, заключенного в одиночные кавычки, поэтому этот программный код не может содержать одиночные кавычки. Ссылки, подобные этой, удобны, когда они «зашиты » в тело разрабатываемой страницы, но еще более удобны, когда они хранятся как закладки, которые можно запустить из любой страницы.-->
<a href='javascript:
    var e = "", r = ""; /* Вычисляемое выражение и результат */
    do {
        /* Отобразить выражение и результат, а затем запросить новое выражение */
        e = prompt("Выражение: " + e + "\n" + r + "\n", e);
        try { r = "Результат:" + eval(e); } /* Попробовать вычислить выражение */
        catch(ex) { r = ex; }               /* Или запомнить ошибку */
    } while(e); /* продолжать, пока не будет введено пустое выражение */
                /* или не будет выполнен щелчок на кнопке Отмена*/
    void 0;     /* Это предотвращает затирание текущего документа */
'>
Обработчик JavaScript-выражений
</a>
