function changeColor() {  // вариант1 случ цвет
  var rez = (Math.random()*(256-200)+200^0).toString(16); // сдвинул в светлые тона.
  if(rez.length<2) rez = 'F'+ rez;      //  если короткое число - удлиняет.
  return rez ;
}
function changeBg() {
// var ind =Math.floor(bgrounds.length*Math.random());  // вариант

 document.body.style.background = ind;              // вариант   bgrounds[i];
 setTimeout('changeBg()', 3000)   //  увеличить
}

<script>  
//  !!!!!  анима заголовка  ##title
var tit = document.title;
var c = 0;

function writetitle() {
  document.title = tit.substring(0,c);
  if(c==tit.length) {
    c = 0;setTimeout("writetitle()", 3000)
  } else {
    c++;
    setTimeout("writetitle()", 200)
  }
}
writetitle()
</script>
