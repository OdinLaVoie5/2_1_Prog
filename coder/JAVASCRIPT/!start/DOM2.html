<style>

.alert {
padding: 15px;
border: 1px solid #d6e9c6;
border-radius: 10px;
color: #9c763d;

}

<script>
// ##appendChild  ##insertBefore   создание, вставка, клонирование элемента
var div = document.createElement('div');
div.className = "alert alert.success";
div.innerHTML = "<strong>Ура!</strong> (клик) Вы прочитали это важное сообщение.";
document.body.insertBefore(div, document.body.firstChild);
// создать копию узла
var div2 = div.cloneNode(true);
// копию можно подправить
div2.querySelector('strong').innerHTML = 'Супер!';
// вставим её после текущего сообщения
document.body.appendChild(div2);


div.onclick = function  (){
document.body.insertBefore(div2, document.body.firstChild);
	document.body.appendChild(div);
}
div2.onclick = function  (){
document.body.insertBefore(div, document.body.firstChild);
	document.body.appendChild(div2);
	
}



</script>
